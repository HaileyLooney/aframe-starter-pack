<!DOCTYPE html>
<html>
  <head>
    <title>The Neon Solitude</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item id="tree" src="Assets/Lowpoly_tree_sample.obj"></a-asset-item>
        <a-asset-item id="swing" src="Assets/Swing.obj"></a-asset-item>
        
      </a-assets>
      <a-obj-model src="#swing" position="-1.692 0.261 -1.770" scale="-0.01 0.01 -0.01" color="orange"></a-obj-model>
      <a-obj-model src="#tree" position="1 -0.4 -4" scale=".25 .25 .25" color="green"></a-obj-model>
      <a-obj-model src="#tree" position="-5.37 -0.4 -4" scale=".25 .25 .25" color="green"></a-obj-model>
      
      <a-cylinder position="-1 0 -4" radius="0.2" height="1" color="#8B4513"></a-cylinder>
      <a-cone position="-1 1 -4" radius-bottom="0.8" height="1.5" color="green"></a-cone>
      <a-cone position="-1 1.8 -4" radius-bottom="0.6" height="1.2" color="green"></a-cone>
      <a-cone position="-1 2.4 -4" radius-bottom="0.4" height="1" color="green"></a-cone>

      <a-cylinder position="-5 0 -4" radius="0.2" height="1" color="#8B4513"></a-cylinder>
      <a-cone position="-5 1 -4" radius-bottom="0.8" height="1.5" color="green"></a-cone>
      <a-cone position="-5 1.8 -4" radius-bottom="0.6" height="1.2" color="green"></a-cone>
      <a-cone position="-5 2.4 -4" radius-bottom="0.4" height="1" color="green"></a-cone>

      
      <a-sky src="NIGHTFINAL.jpg"></a-sky>
    </a-scene>
  </body>
</html>
