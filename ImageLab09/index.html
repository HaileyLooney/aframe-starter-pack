<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
     <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sphere position="0 1.25 -5" radius="1.25" color="#FFFFFF"></a-sphere>
      <a-sphere position="0 3.25 -5" radius="1.0" color="#FFFFFF"></a-sphere>
      <a-sphere position="0 5 -5" radius="0.8" color="#FFFFFF"></a-sphere>
      <a-sphere position="-0.25 5 -4.30" radius="0.1" color="#000000"></a-sphere>
      <a-sphere position="0.25 5 -4.30" radius="0.1" color="#000000"></a-sphere>
      <!--Body Rocks-->
      <a-sphere position="0 3.4 -3.90" radius="0.1" color="#000000"></a-sphere>
      <a-sphere position="0 2.9 -3.90" radius="0.1" color="#000000"></a-sphere>
      <a-sphere position="0 2 -3.50" radius="0.1" color="#000000"></a-sphere>
      <a-sphere position="0 1.5 -3.50" radius="0.1" color="#000000"></a-sphere>
      <!--Top Hat & Nose-->
      <a-box position="0 6 -5" rotation="0 0 0" color="#000000"></a-box>
      <a-sphere position="0 4.2 -3.50" radius="0.1" color="#FF765D"></a-sphere>
      <!--Snow-->
      <a-sphere position="1 2 -3.50" radius="0.1" color="#FFFFFF"></a-sphere>
      <a-sphere position="-1 2 -3.50" radius="0.1" color="#FFFFFF"></a-sphere>
      <a-sphere position="-2 3 -3.50" radius="0.1" color="#FFFFFF"></a-sphere>
      <a-sphere position="2 4 -3.50" radius="0.1" color="#FFFFFF"></a-sphere>
      <a-sphere position="0.5 0.5 -3.50" radius="0.1" color="#FFFFFF"></a-sphere>
      <a-sphere position="2 0.8 -3.50" radius="0.1" color="#FFFFFF"></a-sphere>

      <a-sphere position="3 2 -3.50" radius="0.1" color="#FFFFFF"></a-sphere>
      <a-sphere position="2.1 2 -3.50" radius="0.1" color="#FFFFFF"></a-sphere>
      <a-sphere position="2.3 3 -3.50" radius="0.1" color="#FFFFFF"></a-sphere>
      <a-sphere position="-2 4 -3.50" radius="0.1" color="#FFFFFF"></a-sphere>
      <a-sphere position="-2.1 0.5 -3.50" radius="0.1" color="#FFFFFF"></a-sphere>
      <a-sphere position="2 0.8 -3.50" radius="0.1" color="#FFFFFF"></a-sphere>
      <!-- <a-sky color="#ECECEC"></a-sky> -->
      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <a-entity environment="preset: starry; dressingAmount: 500"></a-entity>
    </a-scene>
  </body>
</html>
